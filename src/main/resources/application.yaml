spring:
  application:
    name: webapp
  datasource:
    url: jdbc:mysql://webapp-reloop.g.aivencloud.com:22316/defaultdb?useSSL=true&requireSSL=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  jackson:
    property-naming-strategy: SNAKE_CASE

climatiq:
  api-key: ${CLIMATIQ_API_KEY:}

server:
  port: 8080
